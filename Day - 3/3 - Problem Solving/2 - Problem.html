<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Get only even numbers using filter </title>
</head>
<body>
    <h1> Get only even numbers using filter </h1>
    <script>
        const array = [1, 2, 3, 4, 5, 6];
        const filterr = array.filter((val) => val % 2 === 0);
        console.log(filterr);
    </script>
</body>
</html>
