<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Reverse a string </title>
</head>
<body>
    <h1> Reverse a string </h1>
    <script>
        const string = () => {
            const str = " Hello World";
            const reverse = str.split("").reverse().join("");
            return reverse;
        };
        console.log(string());
    </script>
</body>
</html>
