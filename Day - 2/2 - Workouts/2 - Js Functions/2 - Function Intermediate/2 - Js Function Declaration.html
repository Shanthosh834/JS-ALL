<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Js Function Intermediate </h1>

    <p id="demo"></p>

    <script>
        function sayHello() {
            return 'Hello World';
        }

        document.getElementById('demo').innerHTML = sayHello();
    </script>
</body>
</html>
