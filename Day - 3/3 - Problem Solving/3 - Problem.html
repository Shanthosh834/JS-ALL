<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sum all numbers using reduce </title>
</head>
<body>
    <h1> Sum all numbers using reduce </h1>
    <script>
        const array = [1, 2, 3, 4, 5];
        const reducee = array.reduce((total, val) => total + val);
        console.log(reducee);
    </script>
</body>
</html>
