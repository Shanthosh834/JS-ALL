<body>
    <h1> Js Strings </h1>
    <script>
        let text = `Here's it is`;
        console.log(text);

        console.log(text.length);

        // inserts a double quote in a string
        let text2 = " in the text the double \"quoted textt\" removed js dont know ";
        console.log(text2);

        // inserts a single quote in a string
        let single = ' This is single quote\'s text';
        console.log(single);

        // inserts a backslash in a string:
        let back = "insert a back \\ slash text ";
        console.log(back);

        // safest way to seperate string
        console.log("Hello " + "Dolly");
    </script>
