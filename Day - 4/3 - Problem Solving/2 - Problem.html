<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Check if string is palindrome </title>
</head>
<body>
    <h1> Check if string is palindrome </h1>
    <script>
        const string = "madam";
        const palin = (str) => {
            const reverse = str.split("").reverse().join("");
            if(reverse === str) {
                console.log(reverse + " Is Palindrome ");
            } else {
                console.log(reverse + " This Is NOt Palinderome " );
            }
        };
        palin("madam");
        palin("ksks");
    </script>
</body>
</html>
