<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Count digits in a number </title>
</head>
<body>
    <h1> Count digits in a number </h1>

    <script>
        const length = digits => {
            return digits.toString().length;
        };
        console.log(length(12345678));
    </script>
</body>
</html>
