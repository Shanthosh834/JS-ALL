<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Merge two objects using spread operator </title>
</head>
<body>
    <h1> Merge two objects using spread operator </h1>
    <script>
        const obj1 = {
            name1: "Shanthosh", age1: 23
        };
        const obj2 = {
            name: "Sandy", age: 24
        };
        const merged = {...obj1, ...obj2}; // same property name will be overwritten
        console.log(merged);
    </script>
</body>
</html>
