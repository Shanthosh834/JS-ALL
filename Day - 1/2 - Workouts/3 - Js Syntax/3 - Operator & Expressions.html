<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Js Syntax </h1>
    <p> Js Syntax </p>
    <p id="assign"></p> <!-- Assignment Operator -->

    <p id="expression"></p> <!-- expression -->

    <p id="expressionvarable"></p> <!-- expression -->

    <script>
        let x = 5; // Assignment Operator
        let a = 5;
        let sum = x + a;
        document.getElementById('assign').innerHTML = " The Sum is: " + sum;

        document.getElementById("expression").innerHTML = (5 + 6) * 10; // expression

        document.getElementById("expressionvarable").innerHTML = x * 10; // expression Variable
    </script>
</body>
</html>
