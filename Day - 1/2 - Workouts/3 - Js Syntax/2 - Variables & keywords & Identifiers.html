<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Js Syntax </h1>

    <p> Let and Const are use to create the Variables </p> <!--Variables-->


    <p id="variables"></p> <!--Variables-->

    <p id="keywords"></p> <!--keywords-->

    <script>

        let o; // Variables
        o = 9;
        document.getElementById('variables').innerHTML = " The Value of o is " + o;


        let x = 5; // keywords
        const fname = "Sandy";
        document.getElementById('keywords').innerHTML = fname + " is " + x + " Years Old. ";

        // so let o; (keyword let and o is identifier )
        // let o = 0; { keyword let and o is varaiable cause it has assignemnt }
    
    </script>
</body>
</html>
