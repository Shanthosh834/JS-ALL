<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Js Promise </h1>
    <script>
        // Example: 1: ( Basic )
        const mypromise = new Promise((resolve, reject) => {
            let success = false;
            if(success) {
            resolve(" Data Loaded!!! ");
            } else {
                reject(" Data Not Loaded!!! ");
            }
        });
        mypromise.then((result) => {
            console.log(result);
        })
        .catch((error) => {
            console.log(error);
        });

        // Example: 2: ( SetTimeout )
        const mypromise2 = new Promise((resolve, reject) => {
            setTimeout(() => {
                let success = true;
                if(success) {
                    resolve(" Data Loaded!!! ");
                } else {
                    reject(" Data Not Loaded!!! ");
                }
            }, 5000);
        });
        mypromise2.then((result) => {
            console.log(result);
        }).catch((err) => {
            console.log(err);
        })
    </script>
</body>
</html>
