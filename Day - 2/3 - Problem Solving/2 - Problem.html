<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  Print numbers 1 to 10 using for loop </title>
</head>
<body>
    <h1>  Print numbers 1 to 10 using for loop </h1>

    <script>
        const number = 10
        for(let i =1; i<=number;i++) {
            console.log(`${i}`);
        }
    </script>
</body>
</html>
