<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Js Functions Beginer </h1>

    <p> Functions that runs Hello World </p>
    <p id="demo"></p>

    <script>
        function sayHello() {
            return 'Hello World';
        }

        let call = sayHello();

        document.getElementById('demo').innerHTML = call;
    </script>
</body>
</html>
