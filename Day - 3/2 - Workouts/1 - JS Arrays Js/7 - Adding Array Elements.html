<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="myfunc()"> Add </button>
    <p id = 'demo'></p>
    <p id = 'demo2'></p>

    <script>
        const fruits = ["Apple","Orange","Pineapple"];
        document.getElementById('demo').innerHTML = fruits;

        const myfunc = () => {
            fruits.push('Lemon'); // fruits[fruits.length] = "Hello"; we can use length too
            document.getElementById('demo').innerHTML = fruits;
        };
            alert(fruits.length);
        // If adding elements with high index create unefined holes
        fruits[6] = "Leo";
        const len = fruits.length;
        let te = "";
        for(let i = 0; i < len; i++) {
            te += fruits[i] + "<br>";
        }
        alert(fruits.length);
        document.getElementById('demo2').innerHTML = te;
    </script>
    </body>
</html>
