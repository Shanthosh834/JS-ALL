<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Double all numbers using map </title>
</head>
<body>
    <h1> Double all numbers using map </h1>
    <script>
        const array = [1, 2, 3, 4, 5];
        const mapp = array.map((val) => val * 2);
        console.log(mapp);
    </script>
</body>
</html>
