<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 4 - hide html element </title>
</head>
<body>
    <h1> Js Topic </h1>

    <p id="text"> This is the text which is ment to be hidden </p>

    <button onClick="hide()"> Click Me </button>

    <script>
        function hide() {
            document.getElementById('text').style.display='none'
        }
    </script>
</body>
</html>
