<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Find maximum number in array </title>
</head>
<body>
    <h1> Find maximum number in array </h1>
    <script>
        const array = [12, 13, 14, 15, 16];
        const maxx = Math.max(...array);
        console.log(maxx);
    </script>
</body>
