<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 3 - Js Can Change Styles </title>
</head>
<body>
    <h1> Js Topics </h1>

    <p id ='demo'> This is the normal text with the normal size</p>

    <Button onClick="textSize()"> Click Me </Button>

    <script>
        function textSize() {
            document.getElementById('demo').style.fontSize='20px'
        }
    </script>
</body>
</html>
