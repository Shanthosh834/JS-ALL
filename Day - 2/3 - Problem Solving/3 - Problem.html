<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calculate factorial using loop </title>
</head>
<body>
    <h1> Calculate factorial using loop </h1>

    <script>

        // Without Fucntion
        const number = 3;
        let fact = 1;
        for(let i = 1; i <= number; i++) {
            fact *= i;
        }
        console.log(`The Factorial of the ${number} is ${fact} `);

        // With Function
        const factorial = num => {
            let fact = 1;
            for(let t = 1; t <= num; t++) {
                fact *= t;
            }
            return fact;
        }
        console.log(factorial(5));
    </script>
</body>
</html>
