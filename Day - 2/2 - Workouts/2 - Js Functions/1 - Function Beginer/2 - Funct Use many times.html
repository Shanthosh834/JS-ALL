<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Js Beginer Function </h1>

    <p> We can Use a function Many times </p>

    <p id="demo"></p>

    <script>
        function add(a,b) {
            return a * b;
        }

        let mul = add(10, 7);

        document.getElementById('demo').innerHTML = mul;
    </script>
</body>
</html>
