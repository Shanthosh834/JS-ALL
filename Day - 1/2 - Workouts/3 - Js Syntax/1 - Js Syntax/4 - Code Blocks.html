<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Js Statement </h1>

    <p> Coe block is used to display or execute the statements at the same time inside { ... } </p>

    <p id="demo1"></p>
    <p id="demo2"></p>

    <button onclick="codeBlock()"> Click Me </button>

    <script>
        function codeBlock() {
            document.getElementById("demo1").innerHTML = "Hello Dolly!";
            document.getElementById("demo2").innerHTML = "How are you?";
        }
    </script>
</body>
</html>
