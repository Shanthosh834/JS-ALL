<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 1 - getElement </title>
</head>
<body>
    <h1> This is Js Concept </h1>

    <p id = "change"> Text Changed </p>

    <button onclick="textChange()"> Click Me </button>

    <script>
        function textChange() {
            document.getElementById('change').innerHTML = 'Text Changed !!! '
        }
    </script>
</body>
</html>
